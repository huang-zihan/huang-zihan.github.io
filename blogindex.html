<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>BLOGS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ruluko&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="assets/css/main.css"/>
    <style>
        body {
            font: 18px/1.8 Ruluko, "PingFang SC", "Microsoft Jhenghei", "Microsoft YaHei", sans-serif;
        }
        h1 {
            margin-top: 50px;
            text-align: center;
        }
        .blogs {
            display: flex;
            flex-wrap: wrap;
            margin: 50px 5%;
            width: 90%;
        }
        .blogs section {
            padding: 20px;
            flex-basis: 33.3%;
            box-sizing: border-box;
            border: 1px solid #eee;
        }
        .blogs section:nth-of-type(2n - 1) { background: #fafafa; }
        .blogs ul { padding: 0 15px; }
        .blogs ul li {
            position: relative;
            margin: 10px 0;
            list-style: none;
          text-align: left;
        }
        .blogs ul li:before {
            content: "";
            position: absolute;
            width: 6px;
            height: 6px;
            background: #c9ced1;
            border-radius: 50%;
            left: -13px;
            top: 12px;
        }
        @media (prefers-color-scheme: dark) {
          html { background: #0e121c; }
          body { color: #6C7486; }
          h3 { color: #cadef8; }
          .blogs section { border: 1px solid #2c2e43; background: #191e31; }
          .blogs section:nth-of-type(2n - 1) { background: #151B2A; }
          .blogs ul li:before { background: #6C7486; }
          .blogs a:hover { color: #cadef8; }
        }
    </style>
</head>

                </li>
            </ul>
        </section>


        <section>
            <h3 id="ruby-and-rails">Theme2</h3>
            <ul>
                <li><a href="/blogs/1.html" target="_blank">1.......</a></li>
           </ul>
        </section>

        <section>

                <li><a href="/blogs/1.html">1.......</a></li>
            </ul>
        </section>
    </div>

</body>
</html>
